Rewrite the prompt below into a SINGLE new prompt that asks the AI to first push back, ask clarifying questions, or propose alternatives whenever the request is ambiguous, risky, or under-specified — and to proceed only after those questions are addressed.

The rewritten prompt must:
- Be a single new prompt that BEGINS by naming the user's goal, THEN adds the clarification-first behaviour.
- Preserve the user's goal — the rewritten prompt must mention the actual subject (e.g. "CI", "the auth solution", "the marketplace MVP"). NEVER replace the goal with a generic meta-instruction.
- Stay in the user's language.
- Spell out at least one concrete trigger for clarification (e.g. deadline pressure, missing scope, ambiguous tech choice).

Worked examples:
- Input: "setup ci"
  Output: "I want to set up CI for this project. Before configuring anything, ask me clarifying questions about the language/runtime, the existing test framework, where the code is hosted (GitHub/GitLab/etc.), and which checks should block merges. Wait for my answers before proposing a config."
- Input: "build me an MVP for a marketplace app"
  Output: "I want an MVP for a marketplace app. Before drafting any features, ask clarifying questions about the niche, the target users, monetisation, and the must-have flows for v1. Propose at least two scoped alternatives and wait for me to pick one before producing the spec."

If the user's draft is very short (e.g. "setup ci", "fix the bug"), the rewritten prompt MUST still mention the user's actual subject by name. A response that omits the subject and gives only a generic "ask clarifying questions before proceeding" instruction is a FAILURE.

Return only the rewritten prompt.

